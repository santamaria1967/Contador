html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Palabras y Corrector de Textos Gratis</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; resize: none; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        textarea:focus { border-color: #3498db; }
        .stats { display: flex; justify-content: space-between; margin: 15px 0; font-weight: bold; color: #7f8c8d; }
        .stats span { background: #edf2f7; padding: 5px 10px; border-radius: 5px; }
        button { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 12px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #27ae60; }
        .result-box { margin-top: 20px; display: none; }
        .result-box h3 { color: #2c3e50; margin-bottom: 8px; }
        .output { background-color: #f9f9f9; padding: 15px; border-left: 4px solid #2ecc71; border-radius: 4px; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>Contador y Corrector de Estilo</h1>
    <textarea id="inputText" placeholder="Pega o escribe tu texto aquí..."></textarea>
    
    <div class="stats">
        <div>Palabras: <span id="wordCount">0</span></div>
        <div>Caracteres: <span id="charCount">0</span></div>
    </div>

    <button onclick="procesarTexto()">Contar y Mejorar Texto</button>

    <div class="result-box" id="resultBox">
        <h3>✨ Texto Mejorado y Corregido:</h3>
        <div class="output" id="outputText"></div>
    </div>
</div>

<script>
    const textInput = document.getElementById('inputText');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');

    textInput.addEventListener('input', () => {
        const text = textInput.value.trim();
        const words = text === "" ? 0 : text.split(/\s+/).length;
        wordCount.innerText = words;
        charCount.innerText = text.length;
    });

    function procesarTexto() {
        let texto = textInput.value;
        if(texto.trim() === "") {
            alert("Por favor, ingresa algún texto primero.");
            return;
        }
        
        let textoCorregido = texto
            .replace(/\b(i|I)magenes\b/g, 'imágenes')
            .replace(/\b(a)nuncio\b/g, 'anuncio')
            .replace(/\b(e)stacion\b/g, 'estación')
            .replace(/\b(p)agina\b/g, 'página')
            .replace(/\b(t)extos\b/g, 'textos')
            .replace(/ ,/g, ',')
            .replace(/ \./g, '.')
            .replace(/\b(q)\b/g, 'que')
            .replace(/\b(tambien)\b/g, 'también')
            .replace(/\b(mas)\b/g, 'más')
            .replace(/\b(asi)\b/g, 'así')
            .replace(/([.?!])\s*(.)/g, function(match, p1, p2) { return p1 + " " + p2.toUpperCase(); });

        textoCorregido = textoCorregido.charAt(0).toUpperCase() + textoCorregido.slice(1);

        document.getElementById('outputText').innerText = textoCorregido;
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
  </html>
